<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | CM Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 15px;
            margin: 0;
        }

        .register-card {
            background: #ffffff;
            border: none;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 550px;
            overflow: hidden;
        }

        .card-header-accent {
            background: #1e293b;
            padding: 35px 30px;
            text-align: center;
            color: white;
        }

        .form-body {
            padding: 40px;
        }

        .form-label {
            font-weight: 600;
            font-size: 0.85rem;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .input-group-text {
            background-color: #f8fafc;
            border-right: none;
            color: #94a3b8;
            border-radius: 12px 0 0 12px;
        }

        .form-control, .form-select {
            border-left: none;
            padding: 12px 15px;
            border-radius: 0 12px 12px 0;
            background-color: #f8fafc;
            border-color: #e2e8f0;
        }

        .form-control:focus, .form-select:focus {
            background-color: #fff;
            border-color: #3b82f6;
            box-shadow: none;
        }

        /* File Upload Styling */
        .file-upload-wrapper {
            border: 2px dashed #e2e8f0;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            background: #f8fafc;
            transition: all 0.3s;
            cursor: pointer;
            position: relative;
        }

        .file-upload-wrapper:hover {
            border-color: #3b82f6;
            background: #eff6ff;
        }

        .file-upload-wrapper i {
            font-size: 1.5rem;
            color: #3b82f6;
            margin-bottom: 8px;
        }

        .btn-register {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 14px;
            font-weight: 700;
            border-radius: 12px;
            width: 100%;
            margin-top: 10px;
            transition: all 0.3s;
        }

        .btn-register:hover {
            background: #2563eb;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.2);
        }

        .login-link {
            text-align: center;
            margin-top: 25px;
            font-size: 0.9rem;
            color: #64748b;
        }
    </style>
</head>
<body>

<div class="register-card">
    <div class="card-header-accent">
        <i class="fas fa-user-circle fa-3x mb-3 text-info"></i>
        <h2 class="fw-bold mb-0">User Registration</h2>
        <p class="text-white-50 small mt-2">Enter your details to create an account</p>
    </div>

    <div class="form-body">
        <form th:action="@{/users/save}" method="post" enctype="multipart/form-data">
            
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Full Name</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-user"></i></span>
                        <input type="text" name="name" class="form-control" placeholder="John Doe" required>
                    </div>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">System Role</label>
                    <select name="role" class="form-select" style="border-left: 1px solid #e2e8f0; border-radius: 12px;" required>
                        <option value="">--Select Role--</option>
                        <option value="USER">Standard User</option>
                        <option value="CM">Chief Minister (CM)</option>
                    </select>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                    <input type="email" name="email" class="form-control" placeholder="example@portal.com" required>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label">Security Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label">Profile Identification Photo</label>
                <div class="file-upload-wrapper" onclick="document.getElementById('photoInput').click();">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <p class="mb-0 small fw-bold text-dark">Click to upload photo</p>
                    <p class="mb-0 text-muted tiny" style="font-size: 0.7rem;">JPG, PNG or GIF (Max 2MB)</p>
                    <input type="file" id="photoInput" name="photo" accept="image/*" style="display: none;" onchange="updateFileName(this)">
                </div>
                <div id="file-name" class="text-center mt-2 small text-primary fw-semibold"></div>
            </div>

            <button type="submit" class="btn-register shadow-sm">
                Register Account
            </button>

            <div class="login-link">
                Already have an account? <a href="/login" class="text-primary fw-bold text-decoration-none">Login here</a>
            </div>
        </form>
    </div>
</div>

<script>
    // Simple script to show the selected filename to the user
    function updateFileName(input) {
        const fileName = input.files[0].name;
        document.getElementById('file-name').innerHTML = `<i class="fas fa-image me-1"></i> Selected: ${fileName}`;
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
