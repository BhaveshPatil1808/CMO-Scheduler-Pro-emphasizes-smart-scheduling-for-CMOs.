<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meeting Management | CM Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
            padding: 40px 20px;
        }

        .container {
            max-width: 1100px;
        }

        /* Header Section */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .page-header h2 {
            font-weight: 800;
            color: #0f172a;
            margin: 0;
            letter-spacing: -1px;
        }

        .btn-new-meeting {
            background: #3b82f6;
            color: white;
            padding: 10px 24px;
            border-radius: 10px;
            font-weight: 600;
            text-decoration: none !important;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.25);
        }

        .btn-new-meeting:hover {
            background: #2563eb;
            transform: translateY(-2px);
            color: white;
        }

        /* Table Card Styling */
        .table-card {
            background: white;
            border-radius: 16px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            overflow: hidden;
        }

        .table {
            margin-bottom: 0;
        }

        .table thead th {
            background: #f1f5f9;
            color: #64748b;
            text-transform: uppercase;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            padding: 16px 24px;
            border-bottom: 1px solid #e2e8f0;
        }

        .table tbody td {
            padding: 18px 24px;
            vertical-align: middle;
            border-bottom: 1px solid #f1f5f9;
            font-size: 0.95rem;
        }

        /* Status Badge Styling */
        .status-pill {
            padding: 6px 12px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        
        /* Using a generic light style for the status */
        .status-generic {
            background-color: #f1f5f9;
            color: #475569;
        }

        /* Action Buttons */
        .action-link {
            font-size: 0.85rem;
            font-weight: 600;
            text-decoration: none !important;
            padding: 6px 12px;
            border-radius: 8px;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .link-approve { color: #16a34a; background: #f0fdf4; }
        .link-approve:hover { background: #dcfce7; }

        .link-reject { color: #dc2626; background: #fef2f2; }
        .link-reject:hover { background: #fee2e2; }

        .link-delete { color: #4b5563; background: #f3f4f6; }
        .link-delete:hover { background: #e5e7eb; color: #111827; }

        .time-text {
            color: #3b82f6;
            font-weight: 500;
            background: #eff6ff;
            padding: 4px 10px;
            border-radius: 6px;
            display: inline-block;
        }
    </style>
</head>
<body>

<div class="container">
    
    <div class="page-header">
        <div>
            <h2>All Meetings</h2>
            <p class="text-muted small mb-0">Overview of all scheduled and pending sessions</p>
        </div>
        <a href="/meetings/new" class="btn-new-meeting shadow-sm">
            <i class="fas fa-plus me-2"></i> Request Meeting
        </a>
    </div>

    <div class="table-card">
        <div class="table-responsive">
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>Meeting Title</th>
                        <th>Scheduled Time</th>
                        <th>Current Status</th>
                        <th class="text-end">Administrative Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="m : ${meetings}">
                        <td>
                            <div class="fw-bold text-dark" th:text="${m.title}">Meeting Title</div>
                        </td>
                        
                        <td>
                            <span class="time-text">
                                <i class="far fa-clock me-1"></i>
                                <span th:text="${m.startTime} + ' - ' + ${m.endTime}">Time Range</span>
                            </span>
                        </td>
                        
                        <td>
                            <span class="status-pill status-generic">
                                <i class="fas fa-circle-info"></i>
                                <span th:text="${m.status}">STATUS</span>
                            </span>
                        </td>

                        <td class="text-end">
                            <div class="d-flex justify-content-end gap-2">
                                <a th:href="@{'/meetings/approve/' + ${m.id}}" class="action-link link-approve">
                                    <i class="fas fa-check"></i> Approve
                                </a>
                                <a th:href="@{'/meetings/reject/' + ${m.id}}" class="action-link link-reject">
                                    <i class="fas fa-times"></i> Reject
                                </a>
                                <a th:href="@{'/meetings/delete/' + ${m.id}}" class="action-link link-delete">
                                    <i class="fas fa-trash-alt"></i> Delete
                                </a>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(meetings)}" class="text-center py-5">
        <i class="fas fa-calendar-xmark fa-3x text-light mb-3"></i>
        <p class="text-muted">No meetings found in the database.</p>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
