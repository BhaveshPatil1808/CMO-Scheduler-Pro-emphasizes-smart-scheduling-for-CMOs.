<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Login | Access Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 15px;
        }

        .login-card {
            background: #ffffff;
            border: none;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        .card-header-custom {
            background: #f8f9fa;
            border-bottom: 1px solid #eee;
            padding: 30px 20px;
            text-align: center;
        }

        .card-header-custom h2 {
            font-weight: 700;
            color: #333;
            margin-bottom: 5px;
        }

        .login-form-body {
            padding: 40px 30px;
        }

        .form-label {
            font-weight: 600;
            font-size: 0.9rem;
            color: #555;
        }

        .input-group-text {
            background-color: #f8f9fa;
            border-right: none;
            color: #aaa;
        }

        .form-control {
            border-left: none;
            padding: 12px;
            border-radius: 0 8px 8px 0;
        }

        .form-control:focus {
            box-shadow: none;
            border-color: #dee2e6;
        }

        .btn-login {
            background: linear-gradient(to right, #667eea, #764ba2);
            border: none;
            color: white;
            padding: 12px;
            font-weight: 600;
            border-radius: 10px;
            width: 100%;
            margin-top: 10px;
            transition: transform 0.2s, opacity 0.2s;
        }

        .btn-login:hover {
            opacity: 0.9;
            transform: translateY(-1px);
            color: white;
        }

        .alert-custom {
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
        }

        .register-section {
            background: #f8f9fa;
            padding: 25px;
            text-align: center;
            border-top: 1px solid #eee;
        }

        .btn-register {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 8px 25px;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-register:hover {
            background-color: #218838;
            box-shadow: 0 4px 12px rgba(40, 167, 69, 0.3);
            color: white;
        }
    </style>
</head>
<body>

<div class="login-container">
    
    <div class="card login-card">
        <div class="card-header-custom">
            <div class="mb-3">
                <i class="fas fa-user-circle fa-4x text-primary" style="background: -webkit-linear-gradient(#667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent;"></i>
            </div>
            <h2>Welcome Back</h2>
            <p class="text-muted small">Please enter your details to login</p>
        </div>

        <div class="login-form-body">
            
            <div th:if="${param.error}" class="alert alert-danger alert-custom">
                <i class="fas fa-exclamation-circle me-2"></i> Invalid credentials. Please try again.
            </div>

            <div th:if="${param.logout}" class="alert alert-success alert-custom">
                <i class="fas fa-check-circle me-2"></i> Logged out successfully.
            </div>

            <form th:action="@{/login}" method="post">
                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                        <input type="text" name="username" class="form-control" placeholder="name@example.com" required/>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label">Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-lock"></i></span>
                        <input type="password" name="password" class="form-control" placeholder="••••••••" required/>
                    </div>
                </div>

                <button type="submit" class="btn btn-login shadow-sm">
                    Login to Dashboard
                </button>
            </form>
        </div>

        <div class="register-section">
            <p class="mb-2 small text-muted">Don't have an account?</p>
            <a href="/users/register" class="btn-register">
                Register Here
            </a>
        </div>
    </div>
    
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
