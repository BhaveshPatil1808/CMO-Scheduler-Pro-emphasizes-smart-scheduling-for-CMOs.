<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule Meeting | CM Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f4f7fe;
            color: #1e293b;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .form-card {
            background: #ffffff;
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 700px;
            overflow: hidden;
        }

        .form-header {
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
            padding: 40px;
            text-align: center;
            color: white;
        }

        .form-header i {
            font-size: 3rem;
            margin-bottom: 15px;
            color: #60a5fa;
        }

        .form-header h2 {
            font-weight: 700;
            margin: 0;
            letter-spacing: -0.5px;
        }

        .form-body {
            padding: 40px;
        }

        .form-label {
            font-weight: 600;
            font-size: 0.9rem;
            color: #64748b;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
        }

        .form-label i {
            margin-right: 8px;
            width: 16px;
            text-align: center;
        }

        .form-control, .form-select {
            padding: 12px 15px;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
            background-color: #f8fafc;
            transition: all 0.2s ease;
        }

        .form-control:focus, .form-select:focus {
            background-color: #fff;
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
            outline: none;
        }

        .btn-submit {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 14px 30px;
            font-weight: 700;
            border-radius: 12px;
            width: 100%;
            margin-top: 20px;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-submit:hover {
            background: #2563eb;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(59, 130, 246, 0.3);
        }

        .section-title {
            font-size: 0.8rem;
            font-weight: 700;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 20px;
            display: block;
            border-bottom: 1px solid #f1f5f9;
            padding-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="form-card">
    <div class="form-header">
        <i class="fas fa-calendar-check"></i>
        <h2>Request a Meeting</h2>
        <p class="text-white-50 mb-0">Fill in the details to schedule an executive session</p>
    </div>

    <div class="form-body">
        <form th:action="@{/meetings/save}" method="post" th:object="${meeting}">
            
            <span class="section-title">General Information</span>
            
            <div class="mb-4">
                <label class="form-label"><i class="fas fa-heading"></i> Meeting Title</label>
                <input type="text" th:field="*{title}" class="form-control" placeholder="e.g. Budget Review 2026" required/>
            </div>

            <div class="mb-4">
                <label class="form-label"><i class="fas fa-align-left"></i> Description</label>
                <input type="text" th:field="*{description}" class="form-control" placeholder="Briefly explain the agenda..."/>
            </div>

            <span class="section-title">Schedule & Priority</span>

            <div class="row g-3 mb-4">
                <div class="col-md-6">
                    <label class="form-label"><i class="fas fa-clock text-success"></i> Start Time</label>
                    <input type="datetime-local" th:field="*{startTime}" class="form-control" required/>
                </div>
                <div class="col-md-6">
                    <label class="form-label"><i class="fas fa-clock text-danger"></i> End Time</label>
                    <input type="datetime-local" th:field="*{endTime}" class="form-control" required/>
                </div>
            </div>

            <div class="row g-3 mb-4">
                <div class="col-md-6">
                    <label class="form-label"><i class="fas fa-flag"></i> Priority Level</label>
                    <select th:field="*{priority}" class="form-select">
                        <option value="HIGH">🔴 HIGH</option>
                        <option value="MEDIUM">🟡 MEDIUM</option>
                        <option value="LOW">🟢 LOW</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label"><i class="fas fa-user-tie"></i> Assign to CM</label>
                    <select th:field="*{cm}" class="form-select" required>
                        <option value="">-- Select CM --</option>
                        <option th:each="cmUser : ${cms}"
                                th:value="${cmUser.id}"
                                th:text="${cmUser.name}">
                        </option>
                    </select>
                </div>
            </div>

            <button type="submit" class="btn-submit shadow-sm">
                <i class="fas fa-paper-plane me-2"></i> Submit Meeting Request
            </button>

        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
